<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" fill="none">
  <!-- Stylised N mark with angular notches, white on transparent -->
  <g transform="translate(30, 20)" fill="#FFFFFF">
    <path d="M 0 0
             L 70 0
             L 70 95
             L 130 30
             L 200 0
             L 200 240
             L 130 240
             L 130 145
             L 70 210
             L 0 240
             Z"/>
  </g>

  <!-- Stacked wordmark: nova / connect -->
  <g transform="translate(290, 0)" fill="#FFFFFF"
     font-family="'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif"
     font-weight="400"
     letter-spacing="-2">
    <text x="0" y="120" font-size="100">nova</text>
    <text x="0" y="240" font-size="100">connect</text>
  </g>
</svg>
